<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Proxy + CSS3D + Depth Mask 統合検証</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #1a1a2e; font-family: sans-serif; }
  #info {
    position: fixed; top: 10px; left: 10px; z-index: 1000;
    background: rgba(0,0,0,0.85); color: #fff; padding: 12px 16px;
    border-radius: 8px; font-size: 13px; line-height: 1.6; max-width: 500px;
  }
  #info h3 { margin-bottom: 6px; color: #4fc3f7; }
  #fps { position: fixed; top: 10px; right: 10px; z-index: 1000;
    background: rgba(0,0,0,0.8); color: #4fc3f7; padding: 8px 12px;
    border-radius: 8px; font-size: 14px; font-family: monospace; }
  #controls {
    position: fixed; bottom: 10px; left: 10px; z-index: 1000;
    background: rgba(0,0,0,0.8); color: #fff; padding: 12px 16px;
    border-radius: 8px; font-size: 13px;
  }
  #controls button {
    margin: 4px; padding: 6px 12px; border: 1px solid #4fc3f7;
    background: transparent; color: #4fc3f7; border-radius: 4px; cursor: pointer;
  }
  #controls button:hover { background: rgba(79,195,247,0.2); }
  #controls button.active { background: rgba(79,195,247,0.4); }
  #css3d-container, #webgl-container {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  }
  #webgl-container { pointer-events: none; }
</style>
</head>
<body>

<div id="info">
  <h3>Proxy + CSS3D + Depth Mask 統合検証</h3>
  <div>左: <span style="color:#ff4444">CNN (プロキシ経由)</span></div>
  <div>右: <span style="color:#4fc3f7">Wikipedia (直接iframe)</span></div>
  <div id="status" style="margin-top:8px; padding:6px; background:rgba(255,152,0,0.3); border-radius:4px;">読み込み中...</div>
</div>
<div id="fps">FPS: --</div>
<div id="controls">
  カメラ操作: マウスドラッグで回転 / ホイールでズーム
  <br>
  <button id="btn-rotate">カメラ回転テスト</button>
  <button id="btn-reset">カメラリセット</button>
</div>

<div id="css3d-container"></div>
<div id="webgl-container"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { CSS3DRenderer, CSS3DObject } from 'three/addons/renderers/CSS3DRenderer.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 5000);
camera.position.set(0, 0, 1800);

// CSS3DRenderer
const css3dRenderer = new CSS3DRenderer();
css3dRenderer.setSize(window.innerWidth, window.innerHeight);
css3dRenderer.domElement.style.position = 'absolute';
css3dRenderer.domElement.style.top = '0';
css3dRenderer.domElement.style.zIndex = '1';
document.getElementById('css3d-container').appendChild(css3dRenderer.domElement);

// WebGLRenderer
const webglRenderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
webglRenderer.setSize(window.innerWidth, window.innerHeight);
webglRenderer.setPixelRatio(window.devicePixelRatio);
webglRenderer.domElement.style.position = 'absolute';
webglRenderer.domElement.style.top = '0';
webglRenderer.domElement.style.zIndex = '2';
webglRenderer.domElement.style.pointerEvents = 'none';
document.getElementById('webgl-container').appendChild(webglRenderer.domElement);

// OrbitControls
const controls = new OrbitControls(camera, css3dRenderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.1;
controls.minDistance = 600;
controls.maxDistance = 4000;

const statusEl = document.getElementById('status');

// ======= LEFT: CNN via proxy =======
const iframeCnn = document.createElement('iframe');
iframeCnn.src = 'http://localhost:3000/api/proxy?url=https://www.cnn.com';
iframeCnn.style.width = '800px';
iframeCnn.style.height = '600px';
iframeCnn.style.border = '3px solid #ff4444';
iframeCnn.style.borderRadius = '8px';
iframeCnn.style.background = '#fff';

const cnnLabel = document.createElement('div');
cnnLabel.style.cssText = 'width:800px;padding:8px;background:#ff4444;color:#fff;font-family:sans-serif;font-size:18px;font-weight:bold;text-align:center;border-radius:8px 8px 0 0';
cnnLabel.textContent = 'CNN (via proxy /api/proxy)';

const cnnContainer = document.createElement('div');
cnnContainer.appendChild(cnnLabel);
cnnContainer.appendChild(iframeCnn);

const cssCnn = new CSS3DObject(cnnContainer);
cssCnn.position.set(-280, 0, 0);
cssCnn.scale.set(0.5, 0.5, 0.5);
scene.add(cssCnn);

// ======= RIGHT: Wikipedia direct =======
const iframeWiki = document.createElement('iframe');
iframeWiki.src = 'https://en.wikipedia.org/wiki/WebRTC';
iframeWiki.style.width = '800px';
iframeWiki.style.height = '600px';
iframeWiki.style.border = '3px solid #4fc3f7';
iframeWiki.style.borderRadius = '8px';
iframeWiki.style.background = '#fff';

const wikiLabel = document.createElement('div');
wikiLabel.style.cssText = 'width:800px;padding:8px;background:#4fc3f7;color:#fff;font-family:sans-serif;font-size:18px;font-weight:bold;text-align:center;border-radius:8px 8px 0 0';
wikiLabel.textContent = 'Wikipedia (direct iframe)';

const wikiContainer = document.createElement('div');
wikiContainer.appendChild(wikiLabel);
wikiContainer.appendChild(iframeWiki);

const cssWiki = new CSS3DObject(wikiContainer);
cssWiki.position.set(280, 0, 0);
cssWiki.scale.set(0.5, 0.5, 0.5);
scene.add(cssWiki);

// ======= WebGL scene + depth masks =======
const webglScene = new THREE.Scene();

function addDepthMask(pos, scale, w, h) {
  const mask = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ colorWrite: false, depthWrite: true })
  );
  mask.position.copy(pos);
  mask.scale.copy(scale);
  mask.renderOrder = -1;
  webglScene.add(mask);
}
addDepthMask(cssCnn.position, cssCnn.scale, 800, 640);
addDepthMask(cssWiki.position, cssWiki.scale, 800, 640);

// Pen stroke across CNN iframe (front)
const strokePts = [];
for (let i = 0; i <= 40; i++) {
  const t = i / 40;
  strokePts.push(new THREE.Vector3(-280 + (t - 0.5) * 350, 80 * Math.sin(t * Math.PI * 3), 10));
}
const curve = new THREE.CatmullRomCurve3(strokePts);
const tube = new THREE.Mesh(
  new THREE.TubeGeometry(curve, 64, 3, 8, false),
  new THREE.MeshBasicMaterial({ color: 0xffeb3b })
);
webglScene.add(tube);

// Avatar spheres
const av1 = new THREE.Mesh(new THREE.SphereGeometry(25, 32, 32), new THREE.MeshBasicMaterial({ color: 0xff4444 }));
av1.position.set(-280, 200, 40);
webglScene.add(av1);

const av2 = new THREE.Mesh(new THREE.SphereGeometry(25, 32, 32), new THREE.MeshBasicMaterial({ color: 0x4fc3f7 }));
av2.position.set(280, 200, 40);
webglScene.add(av2);

// Object behind CNN for occlusion test
const behind = new THREE.Mesh(
  new THREE.BoxGeometry(80, 80, 80),
  new THREE.MeshBasicMaterial({ color: 0x66bb6a })
);
behind.position.set(-280, 0, -80);
webglScene.add(behind);

webglScene.add(new THREE.AmbientLight(0xffffff, 1));

// ======= Status tracking =======
let cnnLoaded = false, wikiLoaded = false;
iframeCnn.addEventListener('load', () => { cnnLoaded = true; updateStatus(); });
iframeWiki.addEventListener('load', () => { wikiLoaded = true; updateStatus(); });
function updateStatus() {
  const parts = [];
  parts.push(`CNN: ${cnnLoaded ? 'loaded (proxy)' : 'loading...'}`);
  parts.push(`Wikipedia: ${wikiLoaded ? 'loaded (direct)' : 'loading...'}`);
  statusEl.innerHTML = parts.join('<br>');
  if (cnnLoaded && wikiLoaded) {
    statusEl.style.background = 'rgba(76,175,80,0.3)';
  }
}

// ======= Controls =======
let autoRotate = false;
document.getElementById('btn-rotate').addEventListener('click', (e) => {
  autoRotate = !autoRotate;
  e.currentTarget.classList.toggle('active', autoRotate);
});
document.getElementById('btn-reset').addEventListener('click', () => {
  autoRotate = false;
  camera.position.set(0, 0, 1800);
  controls.target.set(0, 0, 0);
  document.getElementById('btn-rotate').classList.remove('active');
});

// ======= FPS + Render =======
let fc = 0, lastT = performance.now();
function animate() {
  requestAnimationFrame(animate);
  if (autoRotate) {
    const t = Date.now() * 0.0005;
    camera.position.x = Math.sin(t) * 1800;
    camera.position.z = Math.cos(t) * 1800;
    camera.position.y = Math.sin(t * 0.7) * 300;
    camera.lookAt(0, 0, 0);
  }
  controls.update();
  css3dRenderer.render(scene, camera);
  webglRenderer.render(webglScene, camera);
  fc++;
  const now = performance.now();
  if (now - lastT >= 1000) {
    document.getElementById('fps').textContent = `FPS: ${Math.round(fc * 1000 / (now - lastT))}`;
    fc = 0; lastT = now;
  }
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  css3dRenderer.setSize(window.innerWidth, window.innerHeight);
  webglRenderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
